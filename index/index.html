<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>リアル・クッキング・シミュレーター：超リアル編</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;900&display=swap');
        
        body { 
            font-family: 'M PLUS Rounded 1c', sans-serif; 
            touch-action: none; overflow: hidden;
            user-select: none; -webkit-user-select: none;
        }
        
        /* 大理石風カウンター */
        .kitchen-bg {
            background-color: #e5e5e5;
            background-image: 
                radial-gradient(circle at 100% 50%, transparent 20%, rgba(255,255,255,.3) 21%, rgba(255,255,255,.3) 34%, transparent 35%, transparent),
                radial-gradient(circle at 0% 50%, transparent 20%, rgba(255,255,255,.3) 21%, rgba(255,255,255,.3) 34%, transparent 35%, transparent);
            background-size: 100px 50px;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.1);
        }
        
        /* リアルなまな板 */
        .wood-board {
            background: 
                linear-gradient(rgba(205, 133, 63, 0.8), rgba(139, 69, 19, 0.8)),
                repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(0,0,0,0.05) 10px, rgba(0,0,0,0.05) 20px);
            box-shadow: 
                inset 0 0 20px rgba(0,0,0,0.4), 
                0 15px 25px -5px rgba(0, 0, 0, 0.5),
                0 5px 10px rgba(0,0,0,0.3);
            border-radius: 1.5rem;
            border-bottom: 8px solid #5c3a21;
            border-right: 4px solid #7b4f2d;
        }

        /* リアルなフライパン (CSS描画) */
        .pan-css {
            width: 220px; height: 220px;
            border-radius: 50%;
            background: radial-gradient(circle at 40% 40%, #555 0%, #222 60%, #0a0a0a 100%);
            box-shadow: 
                inset -5px -5px 15px rgba(0,0,0,1), 
                inset 5px 5px 10px rgba(255,255,255,0.2),
                0 25px 25px rgba(0,0,0,0.6);
            border: 6px solid #1a1a1a;
            position: relative;
        }
        .pan-handle {
            width: 40px; height: 160px;
            background: linear-gradient(90deg, #111, #333, #111);
            border-radius: 10px;
            position: absolute;
            bottom: -110px; right: -70px;
            transform: rotate(-45deg);
            box-shadow: 5px 15px 15px rgba(0,0,0,0.5), inset 2px 0 5px rgba(255,255,255,0.1);
            z-index: -1;
        }
        .pan-inner {
            position: absolute; inset: 10px;
            border-radius: 50%;
            background: radial-gradient(circle at 50% 50%, #222 0%, #000 100%);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.9);
            overflow: hidden;
        }

        /* 食材パーティクル */
        .particle {
            position: absolute;
            font-size: 2rem;
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.5));
            transition: filter 0.2s;
            will-change: transform;
        }

        /* リアルなステンレス鍋 */
        .pot-css {
            width: 260px; height: 260px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #f0f0f0 0%, #a0a0a0 40%, #505050 80%, #202020 100%);
            box-shadow: 
                inset 0 0 30px #000, 
                inset -10px -10px 20px rgba(255,255,255,0.4),
                0 30px 30px rgba(0,0,0,0.6);
            border: 8px solid #d4d4d4;
            position: relative;
            overflow: hidden;
        }
        .pot-handle-left, .pot-handle-right {
            position: absolute; top: 50%; width: 40px; height: 100px;
            background: linear-gradient(90deg, #111, #333, #111);
            border-radius: 20px;
            transform: translateY(-50%);
            z-index: -1;
            box-shadow: 0 10px 10px rgba(0,0,0,0.5);
        }
        .pot-handle-left { left: -30px; }
        .pot-handle-right { right: -30px; }

        .stew-liquid {
            position: absolute; inset: 15px;
            border-radius: 50%;
            background: radial-gradient(circle at 40% 40%, rgba(246, 173, 85, 0.9) 0%, rgba(192, 86, 33, 0.95) 80%, #7b341e 100%);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8), inset 5px 5px 15px rgba(255,255,255,0.3);
            transition: background 1s;
            overflow: hidden;
        }
        .stew-liquid.roux-added { 
            background: radial-gradient(circle at 40% 40%, rgba(139, 69, 19, 0.95) 0%, rgba(92, 51, 23, 0.98) 80%, #2b1408 100%);
        }

        /* 渦エフェクト */
        .swirl {
            position: absolute; inset: 0;
            background: conic-gradient(from 0deg, transparent 0%, rgba(0,0,0,0.3) 20%, transparent 40%, rgba(255,255,255,0.1) 60%, transparent 80%);
            border-radius: 50%;
            filter: blur(10px);
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        /* リアルなお玉 */
        #ladle {
            position: absolute; pointer-events: none; z-index: 60;
            width: 80px; height: 80px;
            background: radial-gradient(circle at 30% 30%, #e0e0e0, #888);
            border-radius: 50%;
            box-shadow: inset -5px -5px 10px rgba(0,0,0,0.5), 5px 15px 15px rgba(0,0,0,0.4);
            transform: translate(-50%, -50%);
        }
        #ladle::after {
            content: ''; position: absolute;
            width: 20px; height: 200px;
            background: linear-gradient(90deg, #ccc, #fff, #999);
            bottom: 50%; left: 50%;
            transform: translateX(-50%);
            border-radius: 10px;
            z-index: -1;
            box-shadow: 2px 10px 10px rgba(0,0,0,0.3);
        }

        /* リアルな炎 */
        .fire-container {
            position: absolute; bottom: -20px; display: flex; justify-content: center; gap: 5px; opacity: 0; transition: opacity 0.2s;
            filter: blur(1px) drop-shadow(0 0 10px #ff4500);
        }
        .flame {
            width: 30px; height: 60px;
            background: radial-gradient(ellipse at bottom, #fff 0%, #ffd700 20%, #ff4500 60%, transparent 100%);
            border-radius: 50% 50% 20% 20% / 60% 60% 40% 40%;
            animation: flicker 0.1s infinite alternate;
            transform-origin: bottom center;
        }
        @keyframes flicker {
            0% { transform: scale(1) rotate(-2deg); opacity: 0.9; }
            100% { transform: scale(1.1, 1.3) rotate(2deg); opacity: 1; }
        }

        /* 湯気 */
        .steam {
            position: absolute; width: 60px; height: 60px;
            background: radial-gradient(circle, rgba(255,255,255,0.4) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(8px);
            pointer-events: none;
            animation: rise 2s ease-in forwards;
        }
        @keyframes rise {
            0% { transform: translateY(0) scale(1) rotate(0deg); opacity: 0; }
            20% { opacity: 0.5; }
            100% { transform: translateY(-150px) scale(3) rotate(45deg); opacity: 0; }
        }

        /* UIスライダー・ゲージ */
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 40px; width: 40px; border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #ff6b6b, #c53030);
            cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.4), inset 0 -3px 0 rgba(0,0,0,0.3); border: 2px solid #fff;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 14px; cursor: pointer; background: #374151; border-radius: 10px; box-shadow: inset 0 2px 5px rgba(0,0,0,0.8);
        }
        .gauge-container { background: #d1d5db; border-radius: 9999px; overflow: hidden; height: 12px; box-shadow: inset 0 2px 4px rgba(0,0,0,0.3); }

        .slash-effect {
            position: absolute; background: linear-gradient(90deg, transparent, #fff, transparent); height: 8px; border-radius: 4px; pointer-events: none; transition: all 0.15s ease-out; box-shadow: 0 0 15px rgba(255,255,255,1); z-index: 50;
        }
        
        /* 切断アニメーション用 */
        .split-left { animation: slideLeft 0.5s cubic-bezier(0.1, 0.8, 0.3, 1) forwards; }
        .split-right { animation: slideRight 0.5s cubic-bezier(0.1, 0.8, 0.3, 1) forwards; }
        @keyframes slideLeft { to { transform: translateX(-30px) rotate(-15deg); opacity: 0; } }
        @keyframes slideRight { to { transform: translateX(30px) rotate(15deg); opacity: 0; } }
    </style>
</head>
<body class="kitchen-bg h-screen w-screen flex flex-col items-center justify-center p-2 sm:p-4">

    <div id="app" class="w-full max-w-md h-full max-h-[850px] bg-white/80 backdrop-blur-md rounded-3xl shadow-2xl overflow-hidden border border-white/50 relative flex flex-col">
        <!-- コンテンツ -->
    </div>

    <script>
        const $ = (s) => document.querySelector(s);
        const app = $('#app');
        let activeListeners = [], activeIntervals = [];

        function addEvt(target, type, handler, options = {passive: false}) {
            if(!target) return; target.addEventListener(type, handler, options);
            activeListeners.push({target, type, handler, options});
        }
        function clearEvts() {
            activeListeners.forEach(l => l.target.removeEventListener(l.type, l.handler, l.options));
            activeListeners = []; activeIntervals.forEach(clearInterval); activeIntervals = [];
        }
        function setStgInterval(fn, time) { const id = setInterval(fn, time); activeIntervals.push(id); return id; }
        const getP = (e) => e.touches && e.touches.length > 0 ? {x: e.touches[0].clientX, y: e.touches[0].clientY} : {x: e.clientX, y: e.clientY};

        const state = {
            stage: 'title',
            scores: { cut: 100, fry: 100, boil: 100, stir: 100 },
            ingIdx: 0,
            ingredients: [
                { id: 'onion', name: '玉ねぎ', emoji: '🧅', cutsReq: 4, cuts: 0 },
                { id: 'carrot', name: 'にんじん', emoji: '🥕', cutsReq: 3, cuts: 0 },
                { id: 'potato', name: 'じゃがいも', emoji: '🥔', cutsReq: 3, cuts: 0 },
                { id: 'meat', name: 'お肉', emoji: '🥩', cutsReq: 2, cuts: 0 }
            ],
            burnerLevel: 0, temp: 20,
            fry: { progress: 0, burn: 0 },
            boil: { progress: 0, overflow: 0 },
            stir: { progress: 0 }
        };

        function changeStage(newStage) { clearEvts(); state.stage = newStage; state.burnerLevel = 0; render(); }

        function render() {
            app.innerHTML = '';
            switch(state.stage) {
                case 'title': renderTitle(); break;
                case 'cut': renderCut(); break;
                case 'fry': renderFry(); break;
                case 'boil': renderBoil(); break;
                case 'stir': renderStir(); break;
                case 'result': renderResult(); break;
            }
        }

        // --- エフェクト ---
        function showOnoEffect(x, y, text, color) {
            const el = document.createElement('div');
            el.innerText = text;
            el.className = `absolute text-2xl sm:text-3xl font-black ${color} pointer-events-none z-50 transform -translate-x-1/2 -translate-y-1/2`;
            el.style.left = x + 'px'; el.style.top = y + 'px';
            el.style.transform += ` rotate(${Math.floor(Math.random()*20)-10}deg)`;
            el.style.textShadow = '2px 2px 0 #fff, -2px -2px 0 #fff, 2px -2px 0 #fff, -2px 2px 0 #fff';
            el.animate([ { transform: 'translateY(0) scale(0.5)', opacity: 0 }, { transform: 'translateY(-20px) scale(1.2)', opacity: 1, offset: 0.2 }, { transform: 'translateY(-50px) scale(1)', opacity: 0 } ], { duration: 600, easing: 'ease-out' });
            document.body.appendChild(el); setTimeout(() => el.remove(), 600);
        }

        function drawSlash(x, y, angle) {
            const slash = document.createElement('div');
            slash.className = 'slash-effect';
            slash.style.width = '180px';
            slash.style.left = `${x}px`; slash.style.top = `${y}px`;
            slash.style.transform = `translate(-50%, -50%) rotate(${angle}rad)`;
            document.body.appendChild(slash);
            requestAnimationFrame(() => {
                slash.style.opacity = '0';
                slash.style.transform = `translate(-50%, -50%) rotate(${angle}rad) scaleX(1.5)`;
            });
            setTimeout(() => slash.remove(), 150);
        }

        // ==========================================
        // UIコンポーネント
        // ==========================================
        function renderBurnerControl() {
            return `
                <div class="bg-white/90 p-4 rounded-xl shadow-md border border-gray-200 mt-2">
                    <div class="flex justify-between items-center mb-2">
                        <span class="font-bold text-gray-700"><i class="fas fa-fire-alt text-red-500 mr-1"></i> コンロの火力</span>
                        <span id="burner-label" class="text-sm font-bold text-gray-500 bg-gray-100 px-3 py-1 rounded-full shadow-inner">OFF</span>
                    </div>
                    <input type="range" id="burner-slider" min="0" max="100" value="${state.burnerLevel}">
                </div>
            `;
        }

        function initBurnerControl() {
            const slider = $('#burner-slider'), label = $('#burner-label'), fires = document.querySelectorAll('.flame'), fireCont = $('.fire-container');
            if(!slider) return;
            addEvt(slider, 'input', (e) => {
                state.burnerLevel = parseInt(e.target.value);
                if(state.burnerLevel === 0) { label.innerText = 'OFF'; label.className = 'text-sm font-bold text-gray-500 bg-gray-100 px-3 py-1 rounded-full'; }
                else if(state.burnerLevel < 40) { label.innerText = '弱火'; label.className = 'text-sm font-bold text-blue-600 bg-blue-100 px-3 py-1 rounded-full'; }
                else if(state.burnerLevel < 70) { label.innerText = '中火'; label.className = 'text-sm font-bold text-orange-600 bg-orange-100 px-3 py-1 rounded-full'; }
                else { label.innerText = '強火'; label.className = 'text-sm font-bold text-red-600 bg-red-100 px-3 py-1 rounded-full'; }
                
                if(fireCont) {
                    const power = state.burnerLevel / 100;
                    fireCont.style.opacity = power > 0 ? 1 : 0;
                    fires.forEach((f, i) => {
                        const h = 40 + (power * 40) + (Math.random()*10);
                        f.style.height = `${h}px`;
                        f.style.animationDuration = `${0.05 + Math.random()*0.05}s`;
                    });
                }
            });
        }

        // ==========================================
        // Title
        // ==========================================
        function renderTitle() {
            app.innerHTML = `
                <div class="flex-1 flex flex-col items-center justify-center p-6 text-center">
                    <div class="text-8xl mb-6 drop-shadow-2xl animate-bounce" style="text-shadow: 0 10px 20px rgba(0,0,0,0.3);">👩‍🍳</div>
                    <h1 class="text-3xl font-black text-gray-800 leading-tight mb-2">超リアル・クッキング</h1>
                    <p class="text-white font-bold text-lg mb-8 bg-gradient-to-r from-orange-500 to-red-500 px-6 py-2 rounded-full shadow-md">〜カレーライス編〜</p>
                    <button id="start-btn" class="bg-gray-800 hover:bg-black text-white font-bold py-4 px-12 rounded-full shadow-2xl transform transition hover:scale-105 active:scale-95 text-xl border-b-4 border-gray-600">
                        調理開始！
                    </button>
                </div>
            `;
            addEvt($('#start-btn'), 'click', () => changeStage('cut'));
        }

        // ==========================================
        // Cut (パカッと割れるリアル切断)
        // ==========================================
        function renderCut() {
            const ing = state.ingredients[state.ingIdx];
            if (!ing) return changeStage('fry');

            app.innerHTML = `
                <div class="p-4 flex flex-col h-full bg-orange-50/50">
                    <h2 class="text-2xl font-black text-gray-800 text-center mb-4"><span class="text-orange-500">1.</span> 切る</h2>
                    
                    <div class="wood-board flex-1 relative flex items-center justify-center overflow-hidden my-2 shadow-2xl" id="cut-area">
                        <!-- 食材本体 -->
                        <div id="target-ing" class="text-[120px] select-none relative" style="filter: drop-shadow(0 15px 15px rgba(0,0,0,0.5));">
                            ${ing.emoji}
                        </div>
                    </div>

                    <div class="bg-white p-4 rounded-xl shadow-md border-t-4 border-yellow-400 mt-2 text-center">
                        <p class="text-gray-800 font-bold text-xl">${ing.name} <span class="text-gray-500 text-sm ml-2">残り${ing.cutsReq - ing.cuts}回</span></p>
                        <p class="text-orange-600 text-sm font-bold mt-2 animate-pulse"><i class="fas fa-hand-pointer"></i> スワイプして一刀両断！</p>
                    </div>
                </div>
            `;

            let isCutting = false, lastP = null, lastCutTime = 0;
            const cutArea = $('#cut-area'), targetEl = $('#target-ing');

            const handleDown = (e) => { isCutting = true; lastP = getP(e); };
            const handleUp = () => { isCutting = false; lastP = null; };
            const handleMove = (e) => {
                if (!isCutting || !lastP) return;
                e.preventDefault();
                const p = getP(e);
                const dx = p.x - lastP.x, dy = p.y - lastP.y;
                const dist = Math.sqrt(dx*dx + dy*dy);

                if (dist > 50) {
                    const now = Date.now();
                    if (now - lastCutTime > 300) {
                        const rect = targetEl.getBoundingClientRect();
                        // 判定を少し甘めに
                        if (p.x > rect.left - 50 && p.x < rect.right + 50 && p.y > rect.top - 50 && p.y < rect.bottom + 50) {
                            
                            ing.cuts++;
                            lastCutTime = now;
                            const angle = Math.atan2(dy, dx);
                            
                            drawSlash(p.x, p.y, angle);
                            showOnoEffect(p.x, p.y - 40, "ザクッ！", "text-gray-800");

                            // --- リアル切断アニメーション ---
                            // 本体を一瞬非表示にして、割れる2つの破片を生成
                            targetEl.style.opacity = '0';
                            
                            const pieceLeft = document.createElement('div');
                            pieceLeft.className = 'absolute text-[120px] split-left';
                            pieceLeft.style.clipPath = `polygon(0 0, 50% 0, 50% 100%, 0 100%)`; // 左半分
                            pieceLeft.innerHTML = ing.emoji;
                            
                            const pieceRight = document.createElement('div');
                            pieceRight.className = 'absolute text-[120px] split-right';
                            pieceRight.style.clipPath = `polygon(50% 0, 100% 0, 100% 100%, 50% 100%)`; // 右半分
                            pieceRight.innerHTML = ing.emoji;

                            targetEl.parentNode.appendChild(pieceLeft);
                            targetEl.parentNode.appendChild(pieceRight);

                            setTimeout(() => {
                                pieceLeft.remove(); pieceRight.remove();
                                if (ing.cuts < ing.cutsReq) {
                                    // まだ切る回数が残っていれば少し縮んで復活
                                    targetEl.style.transform = `scale(${1 - ing.cuts*0.15})`;
                                    targetEl.style.opacity = '1';
                                } else {
                                    setTimeout(() => { state.ingIdx++; renderCut(); }, 300);
                                }
                            }, 500);

                        }
                    }
                    lastP = p;
                }
            };

            addEvt(cutArea, 'mousedown', handleDown); addEvt(cutArea, 'touchstart', handleDown);
            addEvt(window, 'mousemove', handleMove); addEvt(window, 'touchmove', handleMove);
            addEvt(window, 'mouseup', handleUp); addEvt(window, 'touchend', handleUp);
        }

        // ==========================================
        // Fry (リアル物理演算：あおり炒め)
        // ==========================================
        let fryParticles = [];

        function renderFry() {
            state.temp = 20; state.fry.progress = 0; state.fry.burn = 0; state.burnerLevel = 0;
            
            // 食材パーティクル初期化
            fryParticles = [];
            const emojis = ['🧅','🧅','🥕','🥔','🥩','🥩'];
            for(let i=0; i<15; i++) {
                fryParticles.push({
                    x: (Math.random()-0.5)*120, // 鍋の半径内
                    y: 0, 
                    vx: 0, vy: 0, 
                    el: null,
                    emoji: emojis[Math.floor(Math.random()*emojis.length)],
                    rot: Math.random()*360
                });
            }

            app.innerHTML = `
                <div class="p-3 flex flex-col h-full bg-gray-50">
                    <h2 class="text-2xl font-black text-gray-800 text-center mb-2"><span class="text-orange-500">2.</span> 炒める</h2>

                    <div class="w-full bg-white p-3 rounded-xl shadow-sm border border-gray-200 mb-2 space-y-3">
                        <div class="relative">
                            <div class="flex justify-between text-xs font-bold text-gray-600 mb-1">
                                <span>鍋の温度 (緑をキープ)</span><span id="temp-display">20℃</span>
                            </div>
                            <div class="gauge-container relative bg-blue-100">
                                <div class="absolute h-full bg-green-400/60 left-[45%] w-[30%] border-x-2 border-green-500 z-10"></div>
                                <div id="temp-bar" class="h-full bg-blue-500 w-[10%] transition-all duration-200"></div>
                            </div>
                        </div>
                        <div>
                            <div class="flex justify-between text-xs font-bold text-gray-600 mb-1">
                                <span>炒め進捗</span><span id="fry-percent">0%</span>
                            </div>
                            <div class="gauge-container"><div id="fry-bar" class="h-full bg-yellow-400 w-0 transition-all duration-200"></div></div>
                        </div>
                    </div>

                    <!-- リアルコンロ＆フライパン -->
                    <div class="flex-1 relative flex items-center justify-center bg-gradient-to-b from-gray-800 to-gray-900 rounded-3xl overflow-hidden shadow-inner border-[10px] border-gray-700" id="stove-area">
                        <!-- 炎 -->
                        <div class="fire-container">
                            <div class="flame"></div><div class="flame"></div><div class="flame"></div><div class="flame"></div><div class="flame"></div>
                        </div>
                        
                        <!-- フライパン -->
                        <div id="pan-wrapper" class="relative z-10 transition-transform duration-75 ease-out will-change-transform">
                            <div class="pan-css">
                                <div class="pan-inner" id="pan-inner"></div>
                                <div class="pan-handle"></div>
                            </div>
                        </div>
                        <div id="fry-touch-area" class="absolute inset-0 z-20 cursor-ew-resize"></div>
                    </div>

                    ${renderBurnerControl()}
                    <p class="text-center text-xs font-bold text-orange-600 mt-1">左右スワイプで鍋を振って焦げを防げ！</p>
                </div>
            `;
            initBurnerControl();

            const inner = $('#pan-inner');
            // パーティクルのDOM生成
            fryParticles.forEach(p => {
                const el = document.createElement('div');
                el.className = 'particle';
                el.innerText = p.emoji;
                inner.appendChild(el);
                p.el = el;
            });

            let isFrying = false, lastX = 0, panX = 0, panDx = 0;
            const touchArea = $('#fry-touch-area'), panWrap = $('#pan-wrapper');
            const centerX = window.innerWidth / 2;

            const handleDown = (e) => { isFrying = true; lastX = getP(e).x; panDx = 0; };
            const handleUp = () => { isFrying = false; panDx = 0; };
            const handleMove = (e) => {
                if (!isFrying) return;
                e.preventDefault();
                const x = getP(e).x;
                panDx = x - lastX;
                panX = Math.max(-60, Math.min(60, panX + panDx));
                lastX = x;
            };

            addEvt(touchArea, 'mousedown', handleDown); addEvt(touchArea, 'touchstart', handleDown);
            addEvt(window, 'mousemove', handleMove); addEvt(window, 'touchmove', handleMove);
            addEvt(window, 'mouseup', handleUp); addEvt(window, 'touchend', handleUp);

            // 物理ループ（高頻度）
            setStgInterval(() => {
                // フライパンの戻り
                if(!isFrying) { panX *= 0.8; panDx = 0; }
                panWrap.style.transform = `translateX(${panX}px) rotate(${panX * 0.1}deg)`;

                // 食材パーティクルの物理演算
                fryParticles.forEach(p => {
                    p.vy += 2; // 重力
                    
                    // 鍋振りによる慣性とジャンプ（あおり効果）
                    if (Math.abs(panDx) > 2) {
                        p.vx -= panDx * 0.3; // 逆方向に慣性
                        // 鍋の端にいるときに強く振られると上に跳ねる
                        if (p.y >= 0 && Math.abs(p.x) > 40 && Math.abs(panDx) > 10) {
                            p.vy -= Math.abs(panDx) * 0.8 + 5; 
                            p.rot += panDx * 5;
                            if(Math.random()<0.1) showOnoEffect(centerX+panX, window.innerHeight/2, "チャッ！", "text-white opacity-50");
                        }
                    }

                    p.x += p.vx; p.y += p.vy;

                    // 鍋の底（バウンド）
                    if (p.y > 0) { p.y = 0; p.vy *= -0.4; p.vx *= 0.8; }
                    // 鍋の壁
                    const limitX = 80;
                    if (p.x > limitX) { p.x = limitX; p.vx *= -0.5; }
                    if (p.x < -limitX) { p.x = -limitX; p.vx *= -0.5; }

                    // 描画 (yはマイナスが上方向)
                    // CSSのパースペクティブを少しつけるため、yが小さい(高い)ほどスケールアップ
                    const scale = 1 + (Math.abs(p.y) * 0.005);
                    p.el.style.transform = `translate(calc(110px - 50% + ${p.x}px), calc(110px - 50% + ${p.y}px)) rotate(${p.rot}deg) scale(${scale})`;
                    
                    // 焦げ色
                    if (state.fry.burn > 50) {
                        p.el.style.filter = `drop-shadow(0 5px 5px rgba(0,0,0,0.5)) brightness(${1 - (state.fry.burn-50)/100})`;
                    }
                });

                // --- ゲームロジック ---
                const heatDelta = (state.burnerLevel * 0.05) - ((state.temp - 20) * 0.005);
                state.temp = Math.max(20, Math.min(300, state.temp + heatDelta));
                
                const isOptimal = state.temp >= 130 && state.temp <= 220;
                if (isOptimal) state.fry.progress += 0.4;
                else if (state.temp > 220) state.fry.burn += 1;

                if (!isFrying && state.temp > 100) state.fry.burn += (state.temp - 100) * 0.01;
                else if(isFrying && Math.abs(panDx) > 5) state.fry.burn = Math.max(0, state.fry.burn - 0.5); // 振ると焦げ解消

                if (state.fry.burn >= 100) {
                    state.fry.burn = 100; state.scores.fry -= 2;
                    if(Math.random()<0.1) spawnSteam(inner, true); // 焦げ煙
                }

                // 炒め音
                if (state.temp > 100 && Math.random() < (state.temp/300)*0.2) {
                    showOnoEffect(centerX+panX+(Math.random()-0.5)*100, window.innerHeight/2+(Math.random()-0.5)*50, "ジュー", "text-orange-300 opacity-60 text-sm");
                }

                // UI
                $('#temp-display').innerText = `${Math.floor(state.temp)}℃`;
                $('#temp-bar').style.width = `${Math.min(100, (state.temp / 300) * 100)}%`;
                $('#temp-bar').className = `h-full transition-all duration-200 relative z-0 ${state.temp<130?'bg-blue-400':state.temp<=220?'bg-green-500':'bg-red-600'}`;
                $('#fry-bar').style.width = `${Math.min(100, state.fry.progress)}%`;
                $('#fry-percent').innerText = `${Math.floor(Math.min(100, state.fry.progress))}%`;

                if (state.fry.progress >= 100) {
                    clearEvts();
                    showFlashEffect(centerX, window.innerHeight/2, '🎉');
                    setTimeout(() => changeStage('boil'), 1500);
                }
            }, 30); // 30ms = 約33fps
        }

        function spawnSteam(parent, isDark = false) {
            const st = document.createElement('div');
            st.className = 'steam';
            if(isDark) st.style.background = 'radial-gradient(circle, rgba(50,50,50,0.6) 0%, transparent 70%)';
            st.style.left = `${20 + Math.random()*60}%`;
            st.style.top = `${40 + Math.random()*40}%`;
            parent.appendChild(st);
            setTimeout(() => st.remove(), 2000);
        }

        // ==========================================
        // Boil (リアル鍋と湯気)
        // ==========================================
        function renderBoil() {
            state.temp = 20; state.boil.progress = 0; state.boil.overflow = 0; state.burnerLevel = 0;

            app.innerHTML = `
                <div class="p-3 flex flex-col h-full bg-gray-50">
                    <h2 class="text-2xl font-black text-gray-800 text-center mb-2"><span class="text-orange-500">3.</span> 煮込む</h2>

                    <div class="w-full bg-white p-3 rounded-xl shadow-sm border border-gray-200 mb-2 space-y-3">
                        <div class="relative">
                            <div class="flex justify-between text-xs font-bold text-gray-600 mb-1">
                                <span>鍋の温度 (沸騰100℃をキープ)</span><span id="temp-display">20℃</span>
                            </div>
                            <div class="gauge-container relative bg-blue-100">
                                <div class="absolute h-full bg-green-400/60 left-[25%] w-[15%] border-x-2 border-green-500 z-10"></div>
                                <div id="temp-bar" class="h-full bg-blue-500 w-[10%] transition-all duration-200"></div>
                            </div>
                        </div>
                        <div>
                            <div class="flex justify-between text-xs font-bold text-gray-600 mb-1">
                                <span>煮込み進捗</span><span id="boil-percent">0%</span>
                            </div>
                            <div class="gauge-container"><div id="boil-bar" class="h-full bg-blue-500 w-0 transition-all duration-200"></div></div>
                        </div>
                    </div>

                    <!-- リアル鍋 -->
                    <div class="flex-1 relative flex items-center justify-center bg-gray-100 rounded-3xl shadow-inner border border-gray-300 mt-1" id="pot-area-bg">
                        
                        <div class="pot-css" id="pot-area">
                            <div class="pot-handle-left"></div>
                            <div class="pot-handle-right"></div>
                            <div class="stew-liquid" id="liquid">
                                <!-- 食材の破片を散りばめる -->
                                <div class="absolute inset-0 flex flex-wrap content-center justify-center gap-2 text-[40px] p-6 opacity-90" id="boil-ings">
                                    🧅🥕🥔🥩🧅🥕
                                </div>
                            </div>
                        </div>

                    </div>

                    ${renderBurnerControl()}
                    <p class="text-center text-xs font-bold text-orange-600 mt-1 animate-pulse">茶色いアクをタップで取れ！強火すぎると吹きこぼれる！</p>
                </div>
            `;
            initBurnerControl();
            const pot = $('#pot-area'), liquid = $('#liquid'), ings = $('#boil-ings');

            setStgInterval(() => {
                if(state.boil.progress >= 100) return;

                const heatDelta = (state.burnerLevel * 0.04) - ((state.temp - 20) * 0.005);
                if (state.temp >= 100 && heatDelta > 0) state.temp += heatDelta * 0.15; // 沸騰後の温度上昇抑制
                else state.temp += heatDelta;
                state.temp = Math.max(20, state.temp);

                const isBoiling = state.temp >= 95;
                const isOverflowing = state.temp > 105;

                if (isBoiling) {
                    state.boil.progress += 0.35;
                    // グツグツ＆湯気
                    ings.style.transform = `scale(${1 + Math.random()*0.03}) translate(${(Math.random()-0.5)*3}px, ${(Math.random()-0.5)*3}px)`;
                    if(Math.random() < 0.3) spawnSteam(pot);
                    if(Math.random() < 0.05) spawnAku(pot);
                    if(Math.random() < 0.2) showOnoEffect(pot.offsetLeft + pot.offsetWidth/2 + (Math.random()-0.5)*100, pot.offsetTop + pot.offsetHeight/2 + (Math.random()-0.5)*100, "ボコッ", "text-white opacity-80 text-lg");
                } else {
                    ings.style.transform = 'scale(1) translate(0,0)';
                }

                if (isOverflowing) state.boil.overflow += 2;
                else state.boil.overflow = Math.max(0, state.boil.overflow - 1);

                if (state.boil.overflow >= 100) {
                    state.boil.overflow = 100; state.scores.boil -= 5;
                    showOnoEffect(window.innerWidth/2, window.innerHeight/2, "吹きこぼれた！", "text-blue-600");
                    pot.style.transform = `translate(${(Math.random()-0.5)*10}px, ${(Math.random()-0.5)*10}px)`; // 激震
                } else {
                    pot.style.transform = 'translate(0,0)';
                }

                $('#temp-display').innerText = `${Math.floor(state.temp)}℃`;
                $('#temp-bar').style.width = `${Math.min(100, (state.temp / 120) * 100)}%`;
                $('#temp-bar').className = `h-full transition-all duration-200 relative z-0 ${state.temp<95?'bg-blue-400':state.temp<=105?'bg-green-500':'bg-red-600'}`;
                $('#boil-bar').style.width = `${Math.min(100, state.boil.progress)}%`;
                $('#boil-percent').innerText = `${Math.floor(Math.min(100, state.boil.progress))}%`;

                if (state.boil.progress >= 100) {
                    clearEvts();
                    const remainingAkus = document.querySelectorAll('.aku-bubble').length;
                    state.scores.boil -= remainingAkus * 5;
                    showFlashEffect(window.innerWidth/2, window.innerHeight/2, '🎉');
                    setTimeout(() => changeStage('stir'), 1500);
                }
            }, 100);
        }

        function spawnAku(pot) {
            const aku = document.createElement('div');
            aku.className = 'aku-bubble flex items-center justify-center';
            const size = 30 + Math.random() * 20;
            aku.style.width = size + 'px'; aku.style.height = size + 'px';
            aku.style.left = `${15 + Math.random() * 60}%`; aku.style.top = `${15 + Math.random() * 60}%`;
            
            const removeAku = (e) => { e.preventDefault(); showFlashEffect(getP(e).x, getP(e).y, '✨'); aku.remove(); };
            addEvt(aku, 'mousedown', removeAku); addEvt(aku, 'touchstart', removeAku);

            setTimeout(() => { if(pot.contains(aku)) { state.scores.boil -= 2; aku.remove(); } }, 3000);
            pot.querySelector('.stew-liquid').appendChild(aku);
        }

        // ==========================================
        // Stir (流体渦シミュレーション)
        // ==========================================
        function renderStir() {
            state.stir.progress = 0; state.temp = 90; state.burnerLevel = 0;

            app.innerHTML = `
                <div class="p-3 flex flex-col h-full bg-gray-50 relative overflow-hidden">
                    <h2 class="text-2xl font-black text-gray-800 text-center mb-2"><span class="text-orange-500">4.</span> 仕上げ</h2>

                    <div id="stir-gauge-container" class="w-full bg-white p-3 rounded-xl shadow-sm border border-gray-200 mb-2 opacity-0 transition-opacity duration-500">
                        <div class="flex justify-between text-xs font-bold text-gray-600 mb-1">
                            <span>ルーの溶け具合</span><span id="stir-percent">0%</span>
                        </div>
                        <div class="gauge-container"><div id="stir-bar" class="h-full bg-yellow-800 w-0 transition-all"></div></div>
                        <p class="text-orange-600 text-xs text-center font-bold mt-2 animate-pulse"><i class="fas fa-sync-alt"></i> 弱火をつけてお玉でぐるぐる混ぜろ！</p>
                    </div>

                    <div class="flex-1 relative flex items-center justify-center mt-2" id="stir-area-bg">
                        <div class="pot-css" id="stir-area">
                            <div class="pot-handle-left"></div><div class="pot-handle-right"></div>
                            <div class="stew-liquid" id="curry-liquid">
                                <!-- 渦エフェクト -->
                                <div class="swirl" id="swirl-effect"></div>
                                <div class="absolute inset-0 flex flex-wrap content-center justify-center gap-2 text-[40px] p-6 opacity-70" id="curry-ings">
                                    🧅🥕🥔🥩
                                </div>
                            </div>
                        </div>

                        <!-- ルー投入ボタン -->
                        <button id="add-roux-btn" class="absolute z-30 bg-yellow-800 text-white font-bold py-4 px-8 rounded-2xl shadow-2xl border-4 border-yellow-600 transform transition hover:scale-105 active:scale-95 flex flex-col items-center gap-2">
                            <span class="text-5xl">🟫</span>
                            <span class="text-lg">火を止めてルーを入れる</span>
                        </button>
                    </div>

                    <div id="ladle" class="opacity-0 transition-opacity"></div>

                    <div class="mt-2 relative">
                        ${renderBurnerControl()}
                    </div>
                </div>
            `;
            initBurnerControl();

            const rouxBtn = $('#add-roux-btn'), liquid = $('#curry-liquid'), swirl = $('#swirl-effect'), ladle = $('#ladle');
            
            addEvt(rouxBtn, 'click', () => {
                if (state.burnerLevel > 0) {
                    state.scores.stir -= 20;
                    showOnoEffect(window.innerWidth/2, window.innerHeight/2, "ダマになる！", "text-red-600");
                    rouxBtn.classList.add('border-red-500', 'bg-red-800');
                    setTimeout(() => rouxBtn.classList.remove('border-red-500', 'bg-red-800'), 500);
                    return;
                }
                
                rouxBtn.classList.add('hidden');
                liquid.classList.add('roux-added');
                $('#curry-ings').innerHTML = '🍛🍛🍛';
                $('#stir-gauge-container').style.opacity = '1';
                ladle.style.opacity = '1';
                
                startStirringMode();
            });
        }

        function startStirringMode() {
            let isStirring = false, lastAngle = null, currentRotation = 0, swirlSpeed = 0;
            const stirArea = $('#stir-area'), swirl = $('#swirl-effect'), ings = $('#curry-ings'), ladle = $('#ladle');
            
            let centerX, centerY;
            const updateCenter = () => {
                const rect = stirArea.getBoundingClientRect();
                centerX = rect.left + rect.width / 2; centerY = rect.top + rect.height / 2;
            };
            updateCenter();

            const handleDown = () => { isStirring = true; updateCenter(); };
            const handleUp = () => { isStirring = false; lastAngle = null; };
            const handleMove = (e) => {
                const p = getP(e);
                ladle.style.left = `${p.x}px`; ladle.style.top = `${p.y}px`;

                if (!isStirring) return;
                e.preventDefault();

                if (state.burnerLevel === 0) {
                    if(Math.random() < 0.05) showOnoEffect(p.x, p.y-50, "冷たい…", "text-blue-500");
                    return;
                } else if (state.burnerLevel > 50) {
                    if(Math.random() < 0.1) showOnoEffect(p.x, p.y-50, "焦げる！", "text-red-600");
                    state.scores.stir -= 0.5;
                }

                const angle = Math.atan2(p.y - centerY, p.x - centerX);
                if (lastAngle !== null) {
                    let delta = angle - lastAngle;
                    if (delta > Math.PI) delta -= Math.PI * 2;
                    if (delta < -Math.PI) delta += Math.PI * 2;
                    
                    const absDelta = Math.abs(delta);
                    if (absDelta < Math.PI / 2) {
                        const efficiency = (state.burnerLevel > 0 && state.burnerLevel <= 40) ? 1.5 : 0.5;
                        state.stir.progress += absDelta * efficiency * 2;
                        
                        swirlSpeed = delta * 20; // 渦の勢い
                    }
                }
                lastAngle = angle;
            };

            addEvt(stirArea, 'mousedown', handleDown); addEvt(stirArea, 'touchstart', handleDown);
            addEvt(window, 'mousemove', handleMove); addEvt(window, 'touchmove', handleMove);
            addEvt(window, 'mouseup', handleUp); addEvt(window, 'touchend', handleUp);
            ladle.style.left = '-100px';

            // 渦と進行のループ
            setStgInterval(() => {
                if(state.stir.progress >= 100) return;

                // 慣性で渦が回り続ける
                swirlSpeed *= 0.95; 
                currentRotation += swirlSpeed;
                
                swirl.style.transform = `rotate(${currentRotation}deg)`;
                ings.style.transform = `rotate(${currentRotation * 0.5}deg)`; // 食材は少し遅れて回る
                
                // 渦の可視化 (早く回すほどくっきり)
                swirl.style.opacity = Math.min(0.8, Math.abs(swirlSpeed) * 0.1);

                $('#stir-bar').style.width = `${Math.min(100, state.stir.progress)}%`;
                $('#stir-percent').innerText = `${Math.floor(Math.min(100, state.stir.progress))}%`;

                if (state.stir.progress >= 100) {
                    clearEvts();
                    swirl.style.opacity = 0;
                    showFlashEffect(centerX, centerY, '🎉');
                    setTimeout(() => changeStage('result'), 1500);
                }
            }, 30);
        }

        // ==========================================
        // Result
        // ==========================================
        function renderResult() {
            const s = state.scores, safeScore = (val) => Math.max(0, val);
            const avg = (safeScore(s.cut) + safeScore(s.fry) + safeScore(s.boil) + safeScore(s.stir)) / 4;
            
            let stars = '⭐', msg = 'カレーが完成！', comment = '料理は練習あるのみ！火加減に注意して再挑戦しよう。';
            if(avg >= 90) { stars = '⭐⭐⭐'; msg = '天才シェフ！'; comment = '温度管理も完璧。現実でも美味しいカレーが作れるはずです！'; } 
            else if(avg >= 70) { stars = '⭐⭐'; msg = '上手にできました！'; comment = '少し焦げたり吹きこぼれたりしたかも？次は火加減をこまめに調整しよう。'; }

            app.innerHTML = `
                <div class="flex-1 flex flex-col items-center justify-center p-6 text-center bg-yellow-50 overflow-y-auto">
                    <h2 class="text-3xl font-black text-gray-800 mb-4">完成！！</h2>
                    <div class="text-[120px] animate-bounce drop-shadow-2xl mb-4" style="filter: drop-shadow(0 20px 20px rgba(0,0,0,0.4));">🍛</div>
                    
                    <div class="bg-white p-5 rounded-2xl shadow-xl border-t-8 border-orange-400 w-full mb-6">
                        <div class="text-4xl tracking-widest text-yellow-400 drop-shadow mb-2">${stars}</div>
                        <p class="text-xl font-bold text-orange-700">${msg}</p>
                        <p class="text-sm text-gray-600 mt-2">${comment}</p>
                    </div>

                    <div class="w-full bg-white p-4 rounded-xl shadow-md border border-gray-200 mb-6 text-left text-sm font-bold">
                        <ul class="space-y-2 text-gray-700">
                            <li class="flex justify-between border-b pb-1"><span>🔪 切る:</span> <span>${safeScore(s.cut)}点</span></li>
                            <li class="flex justify-between border-b pb-1"><span>🍳 炒める (焦げ防止):</span> <span>${Math.floor(safeScore(s.fry))}点</span></li>
                            <li class="flex justify-between border-b pb-1"><span>🍲 煮込む (吹きこぼれ/アク):</span> <span>${Math.floor(safeScore(s.boil))}点</span></li>
                            <li class="flex justify-between"><span>🍛 ルー (火を止めたか):</span> <span>${safeScore(s.stir)}点</span></li>
                        </ul>
                    </div>

                    <button id="retry-btn" class="w-full bg-gray-900 hover:bg-black text-white font-bold py-4 rounded-xl shadow-2xl transition text-xl">もう一度作る</button>
                </div>
            `;
            addEvt($('#retry-btn'), 'click', () => {
                state.scores = { cut: 100, fry: 100, boil: 100, stir: 100 };
                state.ingIdx = 0; state.ingredients.forEach(i => i.cuts = 0);
                changeStage('title');
            });
        }

        render();
    </script>
</body>
</html>
