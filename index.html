<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>リアル・クッキング・シミュレーター：超リアル編</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --boil-color1: rgba(246, 173, 85, 0.9);
            --boil-color2: #7b341e;
            --stir-color1: rgba(139, 69, 19, 0.95);
            --stir-color2: #2b1408;
        }
        @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;900&display=swap');
        
        body { 
            font-family: 'M PLUS Rounded 1c', sans-serif; 
            touch-action: none; overflow: hidden;
            user-select: none; -webkit-user-select: none;
        }
        
        /* 大理石風カウンター */
        .kitchen-bg {
            background-color: #e5e5e5;
            background-image: 
                radial-gradient(circle at 100% 50%, transparent 20%, rgba(255,255,255,.3) 21%, rgba(255,255,255,.3) 34%, transparent 35%, transparent),
                radial-gradient(circle at 0% 50%, transparent 20%, rgba(255,255,255,.3) 21%, rgba(255,255,255,.3) 34%, transparent 35%, transparent);
            background-size: 100px 50px;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.1);
        }
        
        /* リアルなまな板 */
        .wood-board {
            background: 
                linear-gradient(rgba(205, 133, 63, 0.8), rgba(139, 69, 19, 0.8)),
                repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(0,0,0,0.05) 10px, rgba(0,0,0,0.05) 20px);
            box-shadow: 
                inset 0 0 20px rgba(0,0,0,0.4), 
                0 15px 25px -5px rgba(0, 0, 0, 0.5),
                0 5px 10px rgba(0,0,0,0.3);
            border-radius: 1.5rem;
            border-bottom: 8px solid #5c3a21;
            border-right: 4px solid #7b4f2d;
        }

        /* リアルなフライパン (CSS描画) */
        .pan-css {
            width: 220px; height: 220px;
            border-radius: 50%;
            background: radial-gradient(circle at 40% 40%, #555 0%, #222 60%, #0a0a0a 100%);
            box-shadow: 
                inset -5px -5px 15px rgba(0,0,0,1), 
                inset 5px 5px 10px rgba(255,255,255,0.2),
                0 25px 25px rgba(0,0,0,0.6);
            border: 6px solid #1a1a1a;
            position: relative;
        }
        .pan-handle {
            width: 40px; height: 160px;
            background: linear-gradient(90deg, #111, #333, #111);
            border-radius: 10px;
            position: absolute;
            bottom: -110px; right: -70px;
            transform: rotate(-45deg);
            box-shadow: 5px 15px 15px rgba(0,0,0,0.5), inset 2px 0 5px rgba(255,255,255,0.1);
            z-index: -1;
        }
        .pan-inner {
            position: absolute; inset: 10px;
            border-radius: 50%;
            background: radial-gradient(circle at 50% 50%, #222 0%, #000 100%);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.9);
            overflow: hidden;
        }

        /* 食材パーティクル */
        .particle {
            position: absolute;
            font-size: 2rem;
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.5));
            transition: filter 0.2s;
            will-change: transform;
        }

        /* リアルなステンレス鍋 */
        .pot-css {
            width: 260px; height: 260px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #f0f0f0 0%, #a0a0a0 40%, #505050 80%, #202020 100%);
            box-shadow: 
                inset 0 0 30px #000, 
                inset -10px -10px 20px rgba(255,255,255,0.4),
                0 30px 30px rgba(0,0,0,0.6);
            border: 8px solid #d4d4d4;
            position: relative;
            overflow: hidden;
        }
        .pot-handle-left, .pot-handle-right {
            position: absolute; top: 50%; width: 40px; height: 100px;
            background: linear-gradient(90deg, #111, #333, #111);
            border-radius: 20px;
            transform: translateY(-50%);
            z-index: -1;
            box-shadow: 0 10px 10px rgba(0,0,0,0.5);
        }
        .pot-handle-left { left: -30px; }
        .pot-handle-right { right: -30px; }

        .stew-liquid {
            position: absolute; inset: 15px;
            border-radius: 50%;
            background: radial-gradient(circle at 40% 40%, var(--boil-color1) 0%, var(--boil-color2) 100%);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8), inset 5px 5px 15px rgba(255,255,255,0.3);
            transition: background 1s;
            overflow: hidden;
        }
        .stew-liquid.roux-added { 
            background: radial-gradient(circle at 40% 40%, var(--stir-color1) 0%, var(--stir-color2) 100%);
        }

        /* 渦エフェクト */
        .swirl {
            position: absolute; inset: 0;
            background: conic-gradient(from 0deg, transparent 0%, rgba(0,0,0,0.3) 20%, transparent 40%, rgba(255,255,255,0.1) 60%, transparent 80%);
            border-radius: 50%;
            filter: blur(10px);
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        /* リアルなお玉 */
        #ladle {
            position: absolute; pointer-events: none; z-index: 60;
            width: 80px; height: 80px;
            background: radial-gradient(circle at 30% 30%, #e0e0e0, #888);
            border-radius: 50%;
            box-shadow: inset -5px -5px 10px rgba(0,0,0,0.5), 5px 15px 15px rgba(0,0,0,0.4);
            transform: translate(-50%, -50%);
        }
        #ladle::after {
            content: ''; position: absolute;
            width: 20px; height: 200px;
            background: linear-gradient(90deg, #ccc, #fff, #999);
            bottom: 50%; left: 50%;
            transform: translateX(-50%);
            border-radius: 10px;
            z-index: -1;
            box-shadow: 2px 10px 10px rgba(0,0,0,0.3);
        }

        /* リアルな炎 */
        .fire-container {
            position: absolute; bottom: -20px; display: flex; justify-content: center; gap: 5px; opacity: 0; transition: opacity 0.2s;
            filter: blur(1px) drop-shadow(0 0 10px #ff4500);
        }
        .flame {
            width: 30px; height: 60px;
            background: radial-gradient(ellipse at bottom, #fff 0%, #ffd700 20%, #ff4500 60%, transparent 100%);
            border-radius: 50% 50% 20% 20% / 60% 60% 40% 40%;
            animation: flicker 0.1s infinite alternate;
            transform-origin: bottom center;
        }
        @keyframes flicker {
            0% { transform: scale(1) rotate(-2deg); opacity: 0.9; }
            100% { transform: scale(1.1, 1.3) rotate(2deg); opacity: 1; }
        }

        /* 湯気 */
        .steam {
            position: absolute; width: 60px; height: 60px;
            background: radial-gradient(circle, rgba(255,255,255,0.4) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(8px);
            pointer-events: none;
            animation: rise 2s ease-in forwards;
        }
        @keyframes rise {
            0% { transform: translateY(0) scale(1) rotate(0deg); opacity: 0; }
            20% { opacity: 0.5; }
            100% { transform: translateY(-150px) scale(3) rotate(45deg); opacity: 0; }
        }

        /* UIスライダー・ゲージ */
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 40px; width: 40px; border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #ff6b6b, #c53030);
            cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.4), inset 0 -3px 0 rgba(0,0,0,0.3); border: 2px solid #fff;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 14px; cursor: pointer; background: #374151; border-radius: 10px; box-shadow: inset 0 2px 5px rgba(0,0,0,0.8);
        }
        .gauge-container { background: #d1d5db; border-radius: 9999px; overflow: hidden; height: 12px; box-shadow: inset 0 2px 4px rgba(0,0,0,0.3); }

        .slash-effect {
            position: absolute; background: linear-gradient(90deg, transparent, #fff, transparent); height: 8px; border-radius: 4px; pointer-events: none; transition: all 0.15s ease-out; box-shadow: 0 0 15px rgba(255,255,255,1); z-index: 50;
        }
        
        /* 切断アニメーション用 */
        .split-left { animation: slideLeft 0.5s cubic-bezier(0.1, 0.8, 0.3, 1) forwards; }
        .split-right { animation: slideRight 0.5s cubic-bezier(0.1, 0.8, 0.3, 1) forwards; }
        @keyframes slideLeft { to { transform: translateX(-30px) rotate(-15deg); opacity: 0; } }
        @keyframes slideRight { to { transform: translateX(30px) rotate(15deg); opacity: 0; } }
    </style>
</head>
<body class="kitchen-bg h-screen w-screen flex flex-col items-center justify-center p-2 sm:p-4">

    <div id="app" class="w-full max-w-md h-full max-h-[850px] bg-white/80 backdrop-blur-md rounded-3xl shadow-2xl overflow-hidden border border-white/50 relative flex flex-col">
        <!-- コンテンツがここに描画されます -->
    </div>

    <script>
        const $ = (s) => document.querySelector(s);
        const app = $('#app');
        let activeListeners = [], activeIntervals = [];

        function addEvt(target, type, handler, options = {passive: false}) {
            if(!target) return; target.addEventListener(type, handler, options);
            activeListeners.push({target, type, handler, options});
        }
        function clearEvts() {
            activeListeners.forEach(l => l.target.removeEventListener(l.type, l.handler, l.options));
            activeListeners = []; activeIntervals.forEach(clearInterval); activeIntervals = [];
        }
        function setStgInterval(fn, time) { const id = setInterval(fn, time); activeIntervals.push(id); return id; }
        const getP = (e) => e.touches && e.touches.length > 0 ? {x: e.touches[0].clientX, y: e.touches[0].clientY} : {x: e.clientX, y: e.clientY};

        const RECIPES = [
            {
                id: 'curry', name: 'カレーライス', icon: '🍛',
                ingredients: [
                    { name: '玉ねぎ', emoji: '🧅' }, { name: 'にんじん', emoji: '🥕' },
                    { name: 'じゃがいも', emoji: '🥔' }, { name: 'お肉', emoji: '🥩' }
                ],
                boilC1: 'rgba(246,173,85,0.9)', boilC2: '#7b341e', stirC1: 'rgba(139,69,19,0.95)', stirC2: '#2b1408',
                stirMsg: 'ルーを入れてなぞって混ぜろ！'
            },
            {
                id: 'stew', name: 'クリームシチュー', icon: '🍲',
                ingredients: [
                    { name: '玉ねぎ', emoji: '🧅' }, { name: 'にんじん', emoji: '🥕' },
                    { name: 'じゃがいも', emoji: '🥔' }, { name: '鶏肉', emoji: '🍗' }
                ],
                boilC1: 'rgba(255,250,240,0.9)', boilC2: '#dcdcdc', stirC1: 'rgba(255,255,255,0.95)', stirC2: '#f5deb3',
                stirMsg: 'ルーを入れてなぞって混ぜろ！'
            },
            {
                id: 'tonjiru', name: '豚汁', icon: '🥣',
                ingredients: [
                    { name: '大根(代用)', emoji: '🔪' }, { name: '玉ねぎ', emoji: '🧅' },
                    { name: 'しいたけ', emoji: '🍄' }, { name: '豚肉', emoji: '🥓' }
                ],
                boilC1: 'rgba(200,200,200,0.8)', boilC2: '#aaaaaa', stirC1: 'rgba(205,133,63,0.9)', stirC2: '#8b4513',
                stirMsg: '味噌を溶かしながらなぞって混ぜろ！'
            },
            {
                id: 'minestrone', name: 'ミネストローネ', icon: '🍅',
                ingredients: [
                    { name: 'トマト', emoji: '🍅' }, { name: '玉ねぎ', emoji: '🧅' },
                    { name: 'じゃがいも', emoji: '🥔' }, { name: 'ベーコン', emoji: '🥓' }
                ],
                boilC1: 'rgba(255,99,71,0.8)', boilC2: '#b22222', stirC1: 'rgba(220,20,60,0.9)', stirC2: '#8b0000',
                stirMsg: 'じっくりなぞって混ぜろ！'
            },
            {
                id: 'nikujaga', name: '肉じゃが', icon: '🥘',
                ingredients: [
                    { name: 'じゃがいも', emoji: '🥔' }, { name: '玉ねぎ', emoji: '🧅' },
                    { name: 'にんじん', emoji: '🥕' }, { name: '牛肉', emoji: '🥩' }
                ],
                boilC1: 'rgba(139,69,19,0.4)', boilC2: '#5c3a21', stirC1: 'rgba(139,69,19,0.8)', stirC2: '#3a2010',
                stirMsg: '味を染み込ませるためなぞって混ぜろ！'
            }
        ];

        const state = {
            stage: 'title',
            scores: { cut: 100, fry: 100, boil: 100, stir: 100 },
            recipe: null,
            ingIdx: 0,
            ingredients: [],
            burnerLevel: 0, temp: 20,
            fry: { progress: 0, burn: 0 },
            boil: { progress: 0, overflow: 0 },
            stir: { progress: 0 }
        };

        function setRecipe(recipe) {
            state.recipe = recipe;
            const r = document.documentElement;
            r.style.setProperty('--boil-color1', recipe.boilC1);
            r.style.setProperty('--boil-color2', recipe.boilC2);
            r.style.setProperty('--stir-color1', recipe.stirC1);
            r.style.setProperty('--stir-color2', recipe.stirC2);

            state.ingredients = recipe.ingredients.map(ing => {
                const numLines = Math.floor(Math.random() * 2) + 2; // 2 or 3 lines
                const lines = [];
                for(let i=0; i<numLines; i++) {
                    lines.push({ angle: Math.random() * Math.PI, offset: (Math.random() - 0.5) * 80, done: false });
                }
                return { ...ing, lines };
            });
            changeStage('cut');
        }

        function changeStage(newStage) { clearEvts(); state.stage = newStage; state.burnerLevel = 0; render(); }

        function render() {
            app.innerHTML = '';
            switch(state.stage) {
                case 'title': renderTitle(); break;
                case 'cut': renderCut(); break;
                case 'fry': renderFry(); break;
                case 'boil': renderBoil(); break;
                case 'stir': renderStir(); break;
                case 'result': renderResult(); break;
            }
        }

        // --- エフェクト ---
        function showOnoEffect(x, y, text, color) {
            const el = document.createElement('div');
            el.innerText = text;
            el.className = `absolute text-2xl sm:text-3xl font-black ${color} pointer-events-none z-50 transform -translate-x-1/2 -translate-y-1/2`;
            el.style.left = x + 'px'; el.style.top = y + 'px';
            el.style.transform += ` rotate(${Math.floor(Math.random()*20)-10}deg)`;
            el.style.textShadow = '2px 2px 0 #fff, -2px -2px 0 #fff, 2px -2px 0 #fff, -2px 2px 0 #fff';
            el.animate([ { transform: 'translateY(0) scale(0.5)', opacity: 0 }, { transform: 'translateY(-20px) scale(1.2)', opacity: 1, offset: 0.2 }, { transform: 'translateY(-50px) scale(1)', opacity: 0 } ], { duration: 600, easing: 'ease-out' });
            document.body.appendChild(el); setTimeout(() => el.remove(), 600);
        }

        function drawSlash(x, y, angle) {
            const slash = document.createElement('div');
            slash.className = 'slash-effect';
            slash.style.width = '180px';
            slash.style.left = `${x}px`; slash.style.top = `${y}px`;
            slash.style.transform = `translate(-50%, -50%) rotate(${angle}rad)`;
            document.body.appendChild(slash);
            requestAnimationFrame(() => {
                slash.style.opacity = '0';
                slash.style.transform = `translate(-50%, -50%) rotate(${angle}rad) scaleX(1.5)`;
            });
            setTimeout(() => slash.remove(), 150);
        }

        function showFlashEffect(x, y, emoji) {
            const el = document.createElement('div');
            el.innerText = emoji;
            el.className = 'absolute text-[120px] pointer-events-none z-50 transform -translate-x-1/2 -translate-y-1/2 drop-shadow-2xl';
            el.style.left = x + 'px'; el.style.top = y + 'px';
            el.animate([
                { transform: 'translate(-50%, -50%) scale(0)', opacity: 0 },
                { transform: 'translate(-50%, -50%) scale(1.2)', opacity: 1, offset: 0.2 },
                { transform: 'translate(-50%, -50%) scale(1)', opacity: 0 }
            ], { duration: 1200, easing: 'ease-out' });
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 1200);
        }

        function spawnSteam(parent, isDark = false) {
            const st = document.createElement('div');
            st.className = 'steam';
            if(isDark) st.style.background = 'radial-gradient(circle, rgba(50,50,50,0.6) 0%, transparent 70%)';
            st.style.left = `${20 + Math.random()*60}%`;
            st.style.top = `${40 + Math.random()*40}%`;
            parent.appendChild(st);
            setTimeout(() => st.remove(), 2000);
        }

        function renderBurnerControl() {
            return `
                <div class="bg-white/90 p-4 rounded-xl shadow-md border border-gray-200 mt-2">
                    <div class="flex justify-between items-center mb-2">
                        <span class="font-bold text-gray-700"><i class="fas fa-fire-alt text-red-500 mr-1"></i> コンロの火力</span>
                        <span id="burner-label" class="text-sm font-bold text-gray-500 bg-gray-100 px-3 py-1 rounded-full shadow-inner">OFF</span>
                    </div>
                    <input type="range" id="burner-slider" min="0" max="100" value="${state.burnerLevel}">
                </div>
            `;
        }

        function initBurnerControl() {
            const slider = $('#burner-slider'), label = $('#burner-label'), fires = document.querySelectorAll('.flame'), fireCont = $('.fire-container');
            if(!slider) return;
            addEvt(slider, 'input', (e) => {
                state.burnerLevel = parseInt(e.target.value);
                if(state.burnerLevel === 0) { label.innerText = 'OFF'; label.className = 'text-sm font-bold text-gray-500 bg-gray-100 px-3 py-1 rounded-full'; }
                else if(state.burnerLevel < 40) { label.innerText = '弱火'; label.className = 'text-sm font-bold text-blue-600 bg-blue-100 px-3 py-1 rounded-full'; }
                else if(state.burnerLevel < 70) { label.innerText = '中火'; label.className = 'text-sm font-bold text-orange-600 bg-orange-100 px-3 py-1 rounded-full'; }
                else { label.innerText = '強火'; label.className = 'text-sm font-bold text-red-600 bg-red-100 px-3 py-1 rounded-full'; }
                
                if(fireCont) {
                    const power = state.burnerLevel / 100;
                    fireCont.style.opacity = power > 0 ? 1 : 0;
                    fires.forEach((f) => {
                        const h = 40 + (power * 40) + (Math.random()*10);
                        f.style.height = `${h}px`;
                        f.style.animationDuration = `${0.05 + Math.random()*0.05}s`;
                    });
                }
            });
        }

        // ==========================================
        // Title (メニュー選択)
        // ==========================================
        function renderTitle() {
            const menuHtml = RECIPES.map((r, idx) => `
                <button class="recipe-btn bg-white hover:bg-orange-50 border-2 border-orange-200 rounded-xl p-3 shadow-md flex flex-col items-center justify-center transform transition hover:scale-105 active:scale-95" data-idx="${idx}">
                    <span class="text-4xl mb-1 drop-shadow-md">${r.icon}</span>
                    <span class="font-bold text-gray-800 text-sm whitespace-nowrap">${r.name}</span>
                </button>
            `).join('');

            app.innerHTML = `
                <div class="flex-1 flex flex-col items-center justify-center p-6 text-center relative overflow-hidden bg-gradient-to-b from-orange-50 to-orange-100">
                    <div class="text-7xl mb-4 drop-shadow-2xl animate-bounce z-10" style="text-shadow: 0 10px 20px rgba(0,0,0,0.3);">👩‍🍳</div>
                    <h1 class="text-3xl font-black text-gray-800 leading-tight mb-2 z-10 text-shadow">超リアル・クッキング</h1>
                    <p class="text-orange-600 font-bold text-md mb-6 z-10">作りたい料理を選んでね！</p>
                    
                    <div class="grid grid-cols-2 gap-3 z-10 w-full max-w-sm px-2">
                        ${menuHtml}
                    </div>
                </div>
            `;
            
            document.querySelectorAll('.recipe-btn').forEach(btn => {
                addEvt(btn, 'click', (e) => {
                    const idx = e.currentTarget.getAttribute('data-idx');
                    setRecipe(RECIPES[idx]);
                });
            });
        }

        // ==========================================
        // Cut (点線をなぞって切る)
        // ==========================================
        // 線分同士の交差判定
        function doIntersect(p1, q1, p2, q2) {
            function orientation(p, q, r) {
                let val = (q.y - p.y) * (r.x - q.x) - (q.x - p.x) * (r.y - q.y);
                if (val == 0) return 0;
                return (val > 0) ? 1 : 2;
            }
            function onSegment(p, q, r) {
                return q.x <= Math.max(p.x, r.x) && q.x >= Math.min(p.x, r.x) &&
                       q.y <= Math.max(p.y, r.y) && q.y >= Math.min(p.y, r.y);
            }
            let o1 = orientation(p1, q1, p2), o2 = orientation(p1, q1, q2);
            let o3 = orientation(p2, q2, p1), o4 = orientation(p2, q2, q1);
            if (o1 != o2 && o3 != o4) return true;
            if (o1 == 0 && onSegment(p1, p2, q1)) return true;
            if (o2 == 0 && onSegment(p1, q2, q1)) return true;
            if (o3 == 0 && onSegment(p2, p1, q2)) return true;
            if (o4 == 0 && onSegment(p2, q1, q2)) return true;
            return false;
        }

        function renderCut() {
            const ing = state.ingredients[state.ingIdx];
            if (!ing) return changeStage('fry');
            
            const linesHtml = ing.lines.map((l, i) => l.done ? '' : `
                <div class="absolute w-[240px] h-[6px] border-b-[6px] border-dotted border-white/90 drop-shadow-md z-20 pointer-events-none"
                     style="transform: rotate(${l.angle}rad) translateY(${l.offset}px); left: 50%; top: 50%; margin-left: -120px; margin-top: -3px;"></div>
            `).join('');

            app.innerHTML = `
                <div class="p-4 flex flex-col h-full bg-orange-50/50">
                    <h2 class="text-2xl font-black text-gray-800 text-center mb-4"><span class="text-orange-500">1.</span> 切る</h2>
                    
                    <div class="wood-board flex-1 relative flex items-center justify-center overflow-hidden my-2 shadow-2xl" id="cut-area">
                        <div id="target-ing" class="text-[160px] select-none relative flex items-center justify-center transition-transform duration-200" style="filter: drop-shadow(0 15px 15px rgba(0,0,0,0.5));">
                            ${ing.emoji}
                            <div id="lines-container" class="absolute inset-0 flex items-center justify-center pointer-events-none">
                                ${linesHtml}
                            </div>
                        </div>
                    </div>

                    <div class="bg-white p-4 rounded-xl shadow-md border-t-4 border-yellow-400 mt-2 text-center">
                        <p class="text-gray-800 font-bold text-xl">${ing.name}</p>
                        <p class="text-orange-600 text-sm font-bold mt-2 animate-pulse"><i class="fas fa-hand-pointer"></i> 点線をなぞってカットしろ！</p>
                    </div>
                </div>
            `;

            let isCutting = false, lastP = null;
            const cutArea = $('#cut-area'), targetEl = $('#target-ing'), linesContainer = $('#lines-container');

            const handleDown = (e) => { isCutting = true; lastP = getP(e); };
            const handleUp = () => { isCutting = false; lastP = null; };
            
            const updateLinesUI = () => {
                linesContainer.innerHTML = ing.lines.map((l) => l.done ? '' : `
                    <div class="absolute w-[240px] h-[6px] border-b-[6px] border-dotted border-white/90 drop-shadow-md z-20 pointer-events-none"
                         style="transform: rotate(${l.angle}rad) translateY(${l.offset}px); left: 50%; top: 50%; margin-left: -120px; margin-top: -3px;"></div>
                `).join('');
            };

            const handleMove = (e) => {
                if (!isCutting || !lastP) return;
                e.preventDefault();
                const p = getP(e);
                
                const rect = targetEl.getBoundingClientRect();
                const cx = rect.left + rect.width / 2;
                const cy = rect.top + rect.height / 2;
                
                let cutOccurred = false;
                
                ing.lines.forEach((l) => {
                    if(l.done) return;
                    const cosA = Math.cos(l.angle), sinA = Math.sin(l.angle);
                    // 点線の両端を画面座標で計算
                    const ax = cx + cosA * 120 - sinA * l.offset;
                    const ay = cy + sinA * 120 + cosA * l.offset;
                    const bx = cx - cosA * 120 - sinA * l.offset;
                    const by = cy - sinA * 120 + cosA * l.offset;
                    
                    if (doIntersect(lastP, p, {x:ax, y:ay}, {x:bx, y:by})) {
                        l.done = true; cutOccurred = true;
                        drawSlash(p.x, p.y, l.angle);
                        showOnoEffect(p.x, p.y - 40, "ザクッ！", "text-gray-800");
                        
                        // ちょっと揺らすエフェクト
                        targetEl.style.transform = `scale(1.05) rotate(${(Math.random()-0.5)*10}deg)`;
                        setTimeout(() => targetEl.style.transform = 'scale(1) rotate(0deg)', 150);
                    }
                });

                if(cutOccurred) {
                    updateLinesUI();
                    // 全て切り終わったか
                    if(ing.lines.every(l => l.done)) {
                        isCutting = false;
                        
                        // 割れるアニメーション
                        targetEl.style.opacity = '0';
                        const pieceLeft = document.createElement('div');
                        pieceLeft.className = 'absolute text-[160px] split-left flex items-center justify-center';
                        pieceLeft.style.clipPath = `polygon(0 0, 50% 0, 50% 100%, 0 100%)`;
                        pieceLeft.innerHTML = ing.emoji;
                        
                        const pieceRight = document.createElement('div');
                        pieceRight.className = 'absolute text-[160px] split-right flex items-center justify-center';
                        pieceRight.style.clipPath = `polygon(50% 0, 100% 0, 100% 100%, 50% 100%)`;
                        pieceRight.innerHTML = ing.emoji;

                        targetEl.parentNode.appendChild(pieceLeft);
                        targetEl.parentNode.appendChild(pieceRight);

                        setTimeout(() => {
                            pieceLeft.remove(); pieceRight.remove();
                            state.ingIdx++;
                            renderCut();
                        }, 500);
                    }
                }
                lastP = p;
            };

            addEvt(cutArea, 'mousedown', handleDown); addEvt(cutArea, 'touchstart', handleDown);
            addEvt(window, 'mousemove', handleMove); addEvt(window, 'touchmove', handleMove);
            addEvt(window, 'mouseup', handleUp); addEvt(window, 'touchend', handleUp);
        }

        // ==========================================
        // Fry
        // ==========================================
        let fryParticles = [];

        function renderFry() {
            state.temp = 20; state.fry.progress = 0; state.fry.burn = 0; state.burnerLevel = 0;
            
            fryParticles = [];
            state.ingredients.forEach(ing => {
                // 食材ごとに2〜3個のパーティクルを生成
                for(let i=0; i<3; i++) {
                    fryParticles.push({
                        x: (Math.random()-0.5)*120, y: 0, vx: 0, vy: 0, 
                        el: null, emoji: ing.emoji, rot: Math.random()*360
                    });
                }
            });

            app.innerHTML = `
                <div class="p-3 flex flex-col h-full bg-gray-50">
                    <h2 class="text-2xl font-black text-gray-800 text-center mb-2"><span class="text-orange-500">2.</span> 炒める</h2>

                    <div class="w-full bg-white p-3 rounded-xl shadow-sm border border-gray-200 mb-2 space-y-3">
                        <div class="relative">
                            <div class="flex justify-between text-xs font-bold text-gray-600 mb-1">
                                <span>鍋の温度 (緑をキープ)</span><span id="temp-display">20℃</span>
                            </div>
                            <div class="gauge-container relative bg-blue-100">
                                <div class="absolute h-full bg-green-400/60 left-[45%] w-[30%] border-x-2 border-green-500 z-10"></div>
                                <div id="temp-bar" class="h-full bg-blue-500 w-[10%] transition-all duration-200"></div>
                            </div>
                        </div>
                        <div>
                            <div class="flex justify-between text-xs font-bold text-gray-600 mb-1">
                                <span>炒め進捗</span><span id="fry-percent">0%</span>
                            </div>
                            <div class="gauge-container"><div id="fry-bar" class="h-full bg-yellow-400 w-0 transition-all duration-200"></div></div>
                        </div>
                    </div>

                    <div class="flex-1 relative flex items-center justify-center bg-gradient-to-b from-gray-800 to-gray-900 rounded-3xl overflow-hidden shadow-inner border-[10px] border-gray-700" id="stove-area">
                        <div class="fire-container">
                            <div class="flame"></div><div class="flame"></div><div class="flame"></div><div class="flame"></div><div class="flame"></div>
                        </div>
                        <div id="pan-wrapper" class="relative z-10 transition-transform duration-75 ease-out will-change-transform">
                            <div class="pan-css">
                                <div class="pan-inner" id="pan-inner"></div>
                                <div class="pan-handle"></div>
                            </div>
                        </div>
                        <div id="fry-touch-area" class="absolute inset-0 z-20 cursor-ew-resize"></div>
                    </div>

                    ${renderBurnerControl()}
                    <p class="text-center text-xs font-bold text-orange-600 mt-1">左右スワイプで鍋を振って焦げを防げ！</p>
                </div>
            `;
            initBurnerControl();

            const inner = $('#pan-inner');
            fryParticles.forEach(p => {
                const el = document.createElement('div');
                el.className = 'particle'; el.innerText = p.emoji;
                inner.appendChild(el); p.el = el;
            });

            let isFrying = false, lastX = 0, panX = 0, panDx = 0;
            const touchArea = $('#fry-touch-area'), panWrap = $('#pan-wrapper'), centerX = window.innerWidth / 2;

            const handleDown = (e) => { isFrying = true; lastX = getP(e).x; panDx = 0; };
            const handleUp = () => { isFrying = false; panDx = 0; };
            const handleMove = (e) => {
                if (!isFrying) return;
                e.preventDefault();
                const x = getP(e).x;
                panDx = x - lastX;
                panX = Math.max(-60, Math.min(60, panX + panDx));
                lastX = x;
            };

            addEvt(touchArea, 'mousedown', handleDown); addEvt(touchArea, 'touchstart', handleDown);
            addEvt(window, 'mousemove', handleMove); addEvt(window, 'touchmove', handleMove);
            addEvt(window, 'mouseup', handleUp); addEvt(window, 'touchend', handleUp);

            setStgInterval(() => {
                if(!isFrying) { panX *= 0.8; panDx = 0; }
                panWrap.style.transform = `translateX(${panX}px) rotate(${panX * 0.1}deg)`;

                fryParticles.forEach(p => {
                    p.vy += 2; 
                    if (Math.abs(panDx) > 2) {
                        p.vx -= panDx * 0.3; 
                        if (p.y >= 0 && Math.abs(p.x) > 40 && Math.abs(panDx) > 10) {
                            p.vy -= Math.abs(panDx) * 0.8 + 5; p.rot += panDx * 5;
                            if(Math.random()<0.1) showOnoEffect(centerX+panX, window.innerHeight/2, "チャッ！", "text-white opacity-50");
                        }
                    }
                    p.x += p.vx; p.y += p.vy;

                    if (p.y > 0) { p.y = 0; p.vy *= -0.4; p.vx *= 0.8; }
                    const limitX = 80;
                    if (p.x > limitX) { p.x = limitX; p.vx *= -0.5; }
                    if (p.x < -limitX) { p.x = -limitX; p.vx *= -0.5; }

                    const scale = 1 + (Math.abs(p.y) * 0.005);
                    p.el.style.transform = `translate(calc(110px - 50% + ${p.x}px), calc(110px - 50% + ${p.y}px)) rotate(${p.rot}deg) scale(${scale})`;
                    
                    if (state.fry.burn > 50) p.el.style.filter = `drop-shadow(0 5px 5px rgba(0,0,0,0.5)) brightness(${1 - (state.fry.burn-50)/100})`;
                });

                const heatDelta = (state.burnerLevel * 0.05) - ((state.temp - 20) * 0.005);
                state.temp = Math.max(20, Math.min(300, state.temp + heatDelta));
                
                const isOptimal = state.temp >= 130 && state.temp <= 220;
                if (isOptimal) state.fry.progress += 0.4;
                else if (state.temp > 220) state.fry.burn += 1;

                if (!isFrying && state.temp > 100) state.fry.burn += (state.temp - 100) * 0.01;
                else if(isFrying && Math.abs(panDx) > 5) state.fry.burn = Math.max(0, state.fry.burn - 0.5); 

                if (state.fry.burn >= 100) { state.fry.burn = 100; state.scores.fry -= 2; if(Math.random()<0.1) spawnSteam(inner, true); }

                if (state.temp > 100 && Math.random() < (state.temp/300)*0.2) {
                    showOnoEffect(centerX+panX+(Math.random()-0.5)*100, window.innerHeight/2+(Math.random()-0.5)*50, "ジュー", "text-orange-300 opacity-60 text-sm");
                }

                $('#temp-display').innerText = `${Math.floor(state.temp)}℃`;
                $('#temp-bar').style.width = `${Math.min(100, (state.temp / 300) * 100)}%`;
                $('#temp-bar').className = `h-full transition-all duration-200 relative z-0 ${state.temp<130?'bg-blue-400':state.temp<=220?'bg-green-500':'bg-red-600'}`;
                $('#fry-bar').style.width = `${Math.min(100, state.fry.progress)}%`;
                $('#fry-percent').innerText = `${Math.floor(Math.min(100, state.fry.progress))}%`;

                if (state.fry.progress >= 100) {
                    clearEvts(); showFlashEffect(window.innerWidth/2, window.innerHeight/2, '🎉');
                    setTimeout(() => changeStage('boil'), 1500);
                }
            }, 30);
        }

        // ==========================================
        // Boil
        // ==========================================
        function renderBoil() {
            state.temp = 20; state.boil.progress = 0; state.boil.overflow = 0; state.burnerLevel = 0;

            app.innerHTML = `
                <div class="p-3 flex flex-col h-full bg-gray-50">
                    <h2 class="text-2xl font-black text-gray-800 text-center mb-2"><span class="text-orange-500">3.</span> 煮込む</h2>

                    <div class="w-full bg-white p-3 rounded-xl shadow-sm border border-gray-200 mb-2 space-y-3">
                        <div class="relative">
                            <div class="flex justify-between text-xs font-bold text-gray-600 mb-1">
                                <span>鍋の温度 (沸騰100℃をキープ)</span><span id="temp-display">20℃</span>
                            </div>
                            <div class="gauge-container relative bg-blue-100">
                                <div class="absolute h-full bg-green-400/60 left-[25%] w-[20%] border-x-2 border-green-500 z-10"></div>
                                <div id="temp-bar" class="h-full bg-blue-500 w-[10%] transition-all duration-200"></div>
                            </div>
                        </div>
                        <div>
                            <div class="flex justify-between text-xs font-bold text-gray-600 mb-1">
                                <span>煮込み進捗</span><span id="boil-percent">0%</span>
                            </div>
                            <div class="gauge-container"><div id="boil-bar" class="h-full bg-blue-500 w-0 transition-all duration-200"></div></div>
                        </div>
                    </div>

                    <div class="flex-1 relative flex items-center justify-center bg-gradient-to-b from-gray-800 to-gray-900 rounded-3xl overflow-hidden shadow-inner border-[10px] border-gray-700" id="stove-area">
                        <div class="fire-container"><div class="flame"></div><div class="flame"></div><div class="flame"></div><div class="flame"></div><div class="flame"></div></div>
                        <div class="pot-css">
                            <div class="pot-handle-left"></div>
                            <div class="pot-handle-right"></div>
                            <div class="stew-liquid" id="pot-inner"></div>
                        </div>
                    </div>

                    ${renderBurnerControl()}
                    <p class="text-center text-xs font-bold text-orange-600 mt-1">火力を調整して吹きこぼれを防げ！</p>
                </div>
            `;
            initBurnerControl();

            const potInner = $('#pot-inner'), centerX = window.innerWidth / 2;

            setStgInterval(() => {
                const heatDelta = (state.burnerLevel * 0.05) - ((state.temp - 20) * 0.005);
                state.temp = Math.max(20, Math.min(150, state.temp + heatDelta));
                
                if (state.temp >= 95 && state.temp <= 115) state.boil.progress += 0.3;
                
                if (state.temp > 115) {
                    state.boil.overflow += 1;
                    if (state.boil.overflow > 100) { state.boil.overflow = 100; state.scores.boil -= 1; }
                    if(Math.random() < 0.3) showOnoEffect(centerX + (Math.random()-0.5)*120, window.innerHeight/2 + (Math.random()-0.5)*50, "ボコッ！", "text-blue-100 opacity-90 text-sm");
                } else {
                    state.boil.overflow = Math.max(0, state.boil.overflow - 2);
                }
                
                if (state.temp > 80 && Math.random() < (state.temp - 80) * 0.01) spawnSteam(potInner);

                $('#temp-display').innerText = `${Math.floor(state.temp)}℃`;
                $('#temp-bar').style.width = `${Math.min(100, (state.temp / 150) * 100)}%`;
                $('#temp-bar').className = `h-full transition-all duration-200 relative z-0 ${state.temp < 95 ? 'bg-blue-400' : state.temp <= 115 ? 'bg-green-500' : 'bg-red-600'}`;
                $('#boil-bar').style.width = `${Math.min(100, state.boil.progress)}%`;
                $('#boil-percent').innerText = `${Math.floor(Math.min(100, state.boil.progress))}%`;

                if (state.boil.progress >= 100) {
                    clearEvts(); showFlashEffect(window.innerWidth/2, window.innerHeight/2, '🎉');
                    setTimeout(() => changeStage('stir'), 1500);
                }
            }, 30);
        }

        // ==========================================
        // Stir
        // ==========================================
        function renderStir() {
            state.stir.progress = 0;
            app.innerHTML = `
                <div class="p-3 flex flex-col h-full bg-gray-50">
                    <h2 class="text-2xl font-black text-gray-800 text-center mb-2"><span class="text-orange-500">4.</span> 仕上げ</h2>
                    
                    <div class="w-full bg-white p-3 rounded-xl shadow-sm border border-gray-200 mb-2">
                        <div class="flex justify-between text-xs font-bold text-gray-600 mb-1">
                            <span>仕上げ進捗</span><span id="stir-percent">0%</span>
                        </div>
                        <div class="gauge-container"><div id="stir-bar" class="h-full bg-amber-700 w-0 transition-all duration-200"></div></div>
                    </div>
                    
                    <div class="flex-1 relative flex items-center justify-center bg-gradient-to-b from-gray-800 to-gray-900 rounded-3xl overflow-hidden shadow-inner border-[10px] border-gray-700" id="stir-area">
                        <div class="pot-css">
                            <div class="pot-handle-left"></div><div class="pot-handle-right"></div>
                            <div class="stew-liquid roux-added" id="pot-inner">
                                <div class="swirl" id="swirl-effect"></div>
                            </div>
                        </div>
                        <div id="ladle"></div>
                        <div id="stir-touch-area" class="absolute inset-0 z-20 cursor-move"></div>
                    </div>
                    
                    <div class="bg-white p-4 rounded-xl shadow-md border-t-4 border-yellow-400 mt-2 text-center">
                        <p class="text-orange-600 text-sm font-bold animate-pulse"><i class="fas fa-undo"></i> ${state.recipe.stirMsg}</p>
                    </div>
                </div>
            `;
            
            const touchArea = $('#stir-touch-area'), ladle = $('#ladle'), swirl = $('#swirl-effect');
            let isStirring = false, lastAngle = 0, totalAngle = 0;
            
            const updateCenter = () => { const rect = touchArea.getBoundingClientRect(); return { cx: rect.left + rect.width / 2, cy: rect.top + rect.height / 2, rect }; };

            const updateLadle = (x, y) => {
                const { cx, cy, rect } = updateCenter();
                const dx = x - cx, dy = y - cy, angle = Math.atan2(dy, dx);
                
                ladle.style.left = `${x - rect.left}px`; ladle.style.top = `${y - rect.top}px`;
                
                if (isStirring) {
                    let diff = angle - lastAngle;
                    if (diff > Math.PI) diff -= Math.PI * 2; if (diff < -Math.PI) diff += Math.PI * 2;
                    totalAngle += Math.abs(diff);
                    
                    state.stir.progress = Math.min(100, (totalAngle / (Math.PI * 2 * 25)) * 100);
                    $('#stir-bar').style.width = `${state.stir.progress}%`;
                    $('#stir-percent').innerText = `${Math.floor(state.stir.progress)}%`;
                    
                    swirl.style.opacity = Math.min(0.8, totalAngle / (Math.PI * 2 * 10));
                    swirl.style.transform = `rotate(${totalAngle}rad)`;
                    
                    if (state.stir.progress >= 100) {
                        clearEvts(); showFlashEffect(window.innerWidth/2, window.innerHeight/2, state.recipe.icon);
                        setTimeout(() => changeStage('result'), 1500);
                    }
                }
                lastAngle = angle;
            };

            const handleDown = (e) => { isStirring = true; const p = getP(e), { cx, cy } = updateCenter(); lastAngle = Math.atan2(p.y - cy, p.x - cx); updateLadle(p.x, p.y); };
            const handleMove = (e) => { if (!isStirring) return; e.preventDefault(); const p = getP(e); updateLadle(p.x, p.y); };
            const handleUp = () => { isStirring = false; swirl.style.opacity = 0; };
            
            addEvt(touchArea, 'mousedown', handleDown); addEvt(touchArea, 'touchstart', handleDown);
            addEvt(window, 'mousemove', handleMove); addEvt(window, 'touchmove', handleMove);
            addEvt(window, 'mouseup', handleUp); addEvt(window, 'touchend', handleUp);
        }

        // ==========================================
        // Result
        // ==========================================
        function renderResult() {
            const finalCut = state.scores.cut, finalFry = Math.max(0, state.scores.fry), finalBoil = Math.max(0, state.scores.boil);
            const totalScore = Math.floor((finalCut + finalFry + finalBoil + state.scores.stir) / 4);
            
            let rank = '';
            if (totalScore >= 95) rank = `${state.recipe.icon} 三ツ星シェフ ${state.recipe.icon}`;
            else if (totalScore >= 80) rank = '👨‍🍳 優秀な料理人';
            else if (totalScore >= 60) rank = '🧑‍🍳 見習いコック';
            else rank = '☠️ ダークマター錬金術師';
            
            app.innerHTML = `
                <div class="flex-1 flex flex-col items-center justify-center p-6 text-center bg-orange-50 relative overflow-hidden">
                    <div class="absolute inset-0 bg-[radial-gradient(circle_at_center,rgba(255,165,0,0.2)_0%,transparent_70%)] animate-pulse"></div>
                    
                    <h2 class="text-4xl font-black text-gray-800 mb-2 z-10">${state.recipe.name} 完成！</h2>
                    <div class="text-[120px] mb-4 drop-shadow-2xl z-10 transform hover:scale-110 transition-transform">${state.recipe.icon}</div>
                    
                    <div class="bg-white p-6 rounded-2xl shadow-xl border border-orange-200 z-10 w-full max-w-sm mb-8">
                        <h3 class="text-xl font-bold text-gray-700 mb-4 border-b pb-2">調理評価</h3>
                        <div class="text-5xl font-black text-orange-600 mb-2">${totalScore} <span class="text-2xl text-gray-500">点</span></div>
                        <div class="text-xl font-bold text-red-600 mb-4">${rank}</div>
                        <div class="text-sm text-gray-600 space-y-1 bg-gray-50 p-2 rounded text-left">
                            <p class="flex justify-between"><span>食材カット:</span> <span class="font-bold">${finalCut} / 100</span></p>
                            <p class="flex justify-between"><span>炒め（焦げ回避）:</span> <span class="font-bold">${finalFry} / 100</span></p>
                            <p class="flex justify-between"><span>煮込み（火加減）:</span> <span class="font-bold">${finalBoil} / 100</span></p>
                            <p class="flex justify-between"><span>仕上げ（とろみ）:</span> <span class="font-bold">${state.scores.stir} / 100</span></p>
                        </div>
                    </div>
                    
                    <button id="home-btn" class="z-10 bg-gray-800 hover:bg-black text-white font-bold py-3 px-10 rounded-full shadow-lg transform transition hover:scale-105 active:scale-95 text-lg border-b-4 border-gray-600 flex items-center justify-center gap-2">
                        <i class="fas fa-home"></i> メニューへ戻る
                    </button>
                </div>
            `;
            
            addEvt($('#home-btn'), 'click', () => {
                state.scores = { cut: 100, fry: 100, boil: 100, stir: 100 };
                state.ingIdx = 0; state.recipe = null; state.ingredients = [];
                changeStage('title');
            });
        }

        // 初期化実行
        changeStage('title');
    </script>
</body>
</html>
